<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Muscle Tracker · Export/Import</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6fa; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        .bottom-nav-item.active i, .bottom-nav-item.active span { color: #4f46e5; font-weight: 600; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 90%;
            width: 350px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-3">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 relative" style="min-height: 680px;">
        
        <!-- Header avec bouton export rapide -->
        <div class="px-5 pt-6 pb-2 border-b border-gray-100 flex items-center justify-between">
            <h1 class="text-xl font-poppins font-semibold text-gray-800"><i class="fas fa-dumbbell text-indigo-500 mr-2"></i>Muscle Tracker</h1>
            <div class="flex items-center gap-2">
                <button id="quickExportBtn" class="bg-indigo-50 p-2 rounded-full text-indigo-600 hover:bg-indigo-100 transition" title="Exporter les données">
                    <i class="fas fa-download text-sm"></i>
                </button>
                <div class="bg-indigo-50 px-3 py-1 rounded-full text-xs font-medium text-indigo-700 shadow-sm flex items-center gap-1">
                    <i class="fas fa-bolt text-xs"></i> <span id="levelBadge">novice</span>
                </div>
            </div>
        </div>

        <!-- Contenu principal -->
        <div id="appContent" class="p-5 pb-24 transition-opacity duration-200"></div>

        <!-- Barre de navigation bottom -->
        <div class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-200 flex justify-around py-2 px-4 text-xs text-gray-500">
            <div class="bottom-nav-item flex flex-col items-center cursor-pointer active" data-view="dashboard"><i class="fas fa-home text-xl mb-0.5"></i><span>Accueil</span></div>
            <div class="bottom-nav-item flex flex-col items-center cursor-pointer" data-view="add"><i class="fas fa-plus-circle text-xl mb-0.5"></i><span>Ajouter</span></div>
            <div class="bottom-nav-item flex flex-col items-center cursor-pointer" data-view="progress"><i class="fas fa-chart-line text-xl mb-0.5"></i><span>Progrès</span></div>
            <div class="bottom-nav-item flex flex-col items-center cursor-pointer" data-view="profile"><i class="fas fa-user-circle text-xl mb-0.5"></i><span>Profil</span></div>
        </div>
    </div>

    <!-- Modal d'export/import (caché par défaut) -->
    <div id="exportModal" class="modal hidden">
        <div class="modal-content">
            <h3 class="font-poppins font-semibold text-lg mb-4">📦 Sauvegarde des données</h3>
            
            <div class="space-y-4">
                <button id="exportBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition flex items-center justify-center gap-2">
                    <i class="fas fa-download"></i> Exporter (fichier JSON)
                </button>
                
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">ou</span>
                    </div>
                </div>
                
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center">
                    <i class="fas fa-upload text-2xl text-gray-400 mb-2"></i>
                    <p class="text-sm text-gray-600 mb-2">Importer un fichier JSON</p>
                    <input type="file" id="importFile" accept=".json" class="hidden">
                    <button id="importBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg text-sm transition">
                        Choisir un fichier
                    </button>
                </div>
                
                <div id="importStatus" class="text-sm hidden"></div>
                
                <button id="closeModalBtn" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 rounded-lg transition">
                    Fermer
                </button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== MOYENNES NATIONALES ==========
            const NATIONAL_AVERAGES = {
                squat: { male: 105, female: 62 },
                bench: { male: 82, female: 42 },
                deadlift: { male: 135, female: 72 },
                overhead_press: { male: 52, female: 27 },
                barbell_row: { male: 73, female: 37 },
                leg_press: { male: 210, female: 130 },
                lat_pulldown: { male: 70, female: 38 },
                seated_cable_row: { male: 65, female: 35 },
                dumbbell_shoulder_press: { male: 24, female: 12 },
                bicep_curl: { male: 28, female: 14 },
                tricep_extension: { male: 32, female: 17 },
                leg_extension: { male: 70, female: 40 },
                leg_curl: { male: 55, female: 30 },
                hip_thrust: { male: 140, female: 90 },
                pull_up: { male: 10, female: 2 },
                chin_up: { male: 11, female: 3 },
                dip: { male: 15, female: 5 },
                push_up: { male: 35, female: 12 },
                bench_dip: { male: 20, female: 8 },
                run_5k: { male: 21.5, female: 25.0 },
                run_10k: { male: 47.0, female: 54.0 },
                half_marathon: { male: 105, female: 118 },
                bike_20k: { male: 38, female: 44 },
                swim_1k: { male: 19, female: 21.5 },
                row_2k: { male: 7.2, female: 8.4 }
            };

            const EXERCISE_CATEGORY = {
                squat: 'strength', bench: 'strength', deadlift: 'strength', overhead_press: 'strength',
                barbell_row: 'strength', leg_press: 'strength', lat_pulldown: 'strength',
                seated_cable_row: 'strength', dumbbell_shoulder_press: 'strength',
                bicep_curl: 'strength', tricep_extension: 'strength', leg_extension: 'strength',
                leg_curl: 'strength', hip_thrust: 'strength',
                pull_up: 'bodyweight', chin_up: 'bodyweight', dip: 'bodyweight',
                push_up: 'bodyweight', bench_dip: 'bodyweight',
                run_5k: 'cardio', run_10k: 'cardio', half_marathon: 'cardio',
                bike_20k: 'cardio', swim_1k: 'cardio', row_2k: 'cardio'
            };

            const EXERCISE_LABELS = {
                squat: 'Squat', bench: 'Développé couché', deadlift: 'Soulevé de terre',
                overhead_press: 'Développé militaire', barbell_row: 'Rowing barre',
                leg_press: 'Leg press', lat_pulldown: 'Tirage poulie haute',
                seated_cable_row: 'Rowing poulie basse', dumbbell_shoulder_press: 'Développé haltères',
                bicep_curl: 'Curl biceps', tricep_extension: 'Extension triceps',
                leg_extension: 'Extension jambes', leg_curl: 'Leg curl', hip_thrust: 'Hip thrust',
                pull_up: 'Tractions (pronation)', chin_up: 'Tractions (supination)',
                dip: 'Dips', push_up: 'Pompes', bench_dip: 'Dips sur banc',
                run_5k: 'Course 5 km', run_10k: 'Course 10 km', half_marathon: 'Semi-marathon',
                bike_20k: 'Vélo 20 km', swim_1k: 'Natation 1 km', row_2k: 'Rameur 2000 m'
            };

            // ========== ÉTAT GLOBAL ==========
            let state = {
                profile: null,
                performances: [],
                currentView: 'dashboard',
                chartInstance: null
            };

            const contentDiv = document.getElementById('appContent');
            const navItems = document.querySelectorAll('.bottom-nav-item');
            const levelSpan = document.getElementById('levelBadge');
            
            // Éléments du modal
            const modal = document.getElementById('exportModal');
            const quickExportBtn = document.getElementById('quickExportBtn');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const exportBtn = document.getElementById('exportBtn');
            const importBtn = document.getElementById('importBtn');
            const importFile = document.getElementById('importFile');
            const importStatus = document.getElementById('importStatus');

            // ========== CHARGEMENT ET SAUVEGARDE LOCALE ==========
            
            function loadFromStorage() {
                try {
                    const savedProfile = localStorage.getItem('muscleTracker_profile');
                    if (savedProfile) {
                        state.profile = JSON.parse(savedProfile);
                    } else {
                        state.profile = {
                            sex: 'female',
                            age: 28,
                            weight: 62,
                            goal: 'Progresser'
                        };
                    }
                    
                    const savedPerfs = localStorage.getItem('muscleTracker_performances');
                    if (savedPerfs) {
                        state.performances = JSON.parse(savedPerfs);
                    } else {
                        state.performances = [];
                    }
                    
                    updateLevelBadge();
                } catch (e) {
                    console.error('Erreur chargement localStorage:', e);
                    state.profile = { sex: 'female', age: 28, weight: 62, goal: 'Progresser' };
                    state.performances = [];
                }
            }

            function saveAllToStorage() {
                try {
                    localStorage.setItem('muscleTracker_profile', JSON.stringify(state.profile));
                    localStorage.setItem('muscleTracker_performances', JSON.stringify(state.performances));
                } catch (e) {
                    console.error('Erreur sauvegarde:', e);
                }
            }

            function saveProfileToStorage(profile) {
                state.profile = profile;
                saveAllToStorage();
            }

            function savePerformanceToStorage(perf) {
                state.performances = [perf, ...state.performances];
                saveAllToStorage();
                updateLevelBadge();
            }

            function updateLevelBadge() {
                const count = state.performances.length;
                if (count < 4) levelSpan.innerText = 'novice';
                else if (count < 10) levelSpan.innerText = 'intermédiaire';
                else levelSpan.innerText = 'confirmé';
            }

            // ========== FONCTIONS D'EXPORT/IMPORT ==========
            
            function exportData() {
                const exportObj = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    profile: state.profile,
                    performances: state.performances
                };
                
                const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `muscle-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showImportStatus('success', '✅ Export réussi !');
            }

            function importData(file) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    try {
                        const imported = JSON.parse(e.target.result);
                        
                        // Validation basique
                        if (!imported.profile || !imported.performances || !Array.isArray(imported.performances)) {
                            throw new Error('Format de fichier invalide');
                        }
                        
                        // Mise à jour de l'état
                        state.profile = imported.profile;
                        state.performances = imported.performances;
                        
                        // Sauvegarde dans localStorage
                        saveAllToStorage();
                        
                        // Mise à jour de l'interface
                        updateLevelBadge();
                        renderView(state.currentView);
                        
                        showImportStatus('success', '✅ Import réussi ! Les données sont chargées.');
                        
                        // Fermer le modal après 2 secondes
                        setTimeout(() => {
                            modal.classList.add('hidden');
                        }, 2000);
                        
                    } catch (err) {
                        console.error('Erreur import:', err);
                        showImportStatus('error', '❌ Erreur : fichier invalide');
                    }
                };
                
                reader.readAsText(file);
            }

            function showImportStatus(type, message) {
                importStatus.className = 'text-sm p-2 rounded-lg ' + 
                    (type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700');
                importStatus.textContent = message;
                importStatus.classList.remove('hidden');
                
                setTimeout(() => {
                    importStatus.classList.add('hidden');
                }, 3000);
            }

            // ========== GESTION DU MODAL ==========
            
            quickExportBtn.addEventListener('click', () => {
                modal.classList.remove('hidden');
            });
            
            closeModalBtn.addEventListener('click', () => {
                modal.classList.add('hidden');
            });
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.add('hidden');
                }
            });
            
            exportBtn.addEventListener('click', () => {
                exportData();
            });
            
            importBtn.addEventListener('click', () => {
                importFile.click();
            });
            
            importFile.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    importData(e.target.files[0]);
                }
            });

            // ========== FONCTIONS DE COMPARAISON ==========
            
            function computePerformanceValue(perf) {
                const exo = perf.exercise;
                const cat = EXERCISE_CATEGORY[exo] || 'strength';
                if (cat === 'cardio') return perf.time_min;
                if (cat === 'bodyweight') return perf.reps;
                if (perf.weight && perf.reps) return perf.weight * (1 + perf.reps / 30);
                return null;
            }

            function getComparisonMessage(exercise, perfValue, sex) {
                const avg = NATIONAL_AVERAGES[exercise]?.[sex];
                if (!avg) return "Pas de référence nationale pour cet exercice.";
                const cat = EXERCISE_CATEGORY[exercise];
                
                if (cat === 'cardio') {
                    const diff = ((avg - perfValue) / avg * 100).toFixed(1);
                    if (perfValue < avg) return `🚀 ${perfValue} min (${diff}% plus rapide)`;
                    if (perfValue > avg) return `⏱️ ${perfValue} min (${Math.abs(diff)}% plus lent)`;
                    return `Égal à la moyenne (${avg} min)`;
                } else {
                    const diff = ((perfValue - avg) / avg * 100).toFixed(1);
                    if (perfValue > avg) return `🏆 ${perfValue.toFixed(1)} (+${diff}% > moyenne)`;
                    if (perfValue < avg) return `📈 ${perfValue.toFixed(1)} (${Math.abs(diff)}% < moyenne)`;
                    return `✅ Égal à la moyenne (${avg})`;
                }
            }

            // ========== RENDU DES VUES ==========
            
            function renderDashboard() {
                const lastPerf = state.performances[0];
                const sex = state.profile?.sex || 'female';
                let perfHtml = '';
                
                if (lastPerf) {
                    const val = computePerformanceValue(lastPerf);
                    const msg = val ? getComparisonMessage(lastPerf.exercise, val, sex) : 'Performance incomplète';
                    perfHtml = `
                        <div class="bg-indigo-50 p-4 rounded-xl mt-2">
                            <p class="text-sm text-gray-600">Dernière séance : <span class="font-semibold">${EXERCISE_LABELS[lastPerf.exercise] || lastPerf.exercise}</span></p>
                            <p class="text-lg font-medium">${lastPerf.weight ? lastPerf.weight+' kg' : ''} ${lastPerf.reps ? lastPerf.reps+' reps' : ''} ${lastPerf.time_min ? lastPerf.time_min+' min' : ''}</p>
                            <p class="text-sm mt-1 ${val > (NATIONAL_AVERAGES[lastPerf.exercise]?.[sex]||0) ? 'text-green-600' : 'text-amber-600'}">${msg}</p>
                        </div>
                    `;
                } else {
                    perfHtml = `<p class="text-gray-400 text-center py-4">Aucune performance enregistrée. Ajoutez-en !</p>`;
                }

                const nbSeances = state.performances.length;
                const niveauTexte = levelSpan.innerText;
                const prochainPalier = nbSeances < 4 ? 4 - nbSeances : (nbSeances < 10 ? 10 - nbSeances : 'max');
                const progression = nbSeances === 0 ? 0 : Math.min(100, (nbSeances / 14) * 100);

                contentDiv.innerHTML = `
                    <div class="space-y-5">
                        <div class="flex items-center gap-4 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                            <div class="w-16 h-16 rounded-full bg-indigo-100 flex items-center justify-center relative">
                                <span class="text-xl font-bold text-indigo-700">${progression}%</span>
                            </div>
                            <div>
                                <p class="text-gray-500 text-xs">NIVEAU GLOBAL</p>
                                <p class="font-poppins font-semibold text-xl">${niveauTexte}</p>
                                <p class="text-xs text-gray-400">${prochainPalier === 'max' ? 'Excellent rythme' : `encore ${prochainPalier} séances pour monter`}</p>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                            <h2 class="font-medium text-gray-700 mb-2 flex items-center gap-1"><i class="fas fa-clock text-indigo-400"></i> Dernière activité</h2>
                            ${perfHtml}
                        </div>

                        <div class="bg-gradient-to-r from-indigo-50 to-purple-50 p-4 rounded-2xl">
                            <p class="text-xs text-indigo-700 uppercase tracking-wider">objectif</p>
                            <p class="font-medium">${state.profile?.goal || 'progresser'}</p>
                            <div class="flex gap-3 mt-2 text-xs text-gray-600">
                                <span><i class="fas fa-venus-mars mr-1"></i>${state.profile?.sex === 'male' ? 'Homme' : 'Femme'}</span>
                                <span><i class="fas fa-calendar-alt mr-1"></i>${state.profile?.age || '--'} ans</span>
                                <span><i class="fas fa-weight-scale mr-1"></i>${state.profile?.weight || '--'} kg</span>
                            </div>
                        </div>

                        <div class="bg-white p-3 rounded-xl border border-indigo-100 text-xs flex gap-2 items-center">
                            <i class="fas fa-database text-indigo-500"></i>
                            <span>Données sauvegardées localement</span>
                            <button onclick="document.getElementById('quickExportBtn').click()" class="ml-auto text-indigo-600 hover:text-indigo-800">
                                <i class="fas fa-share-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
            }

            function renderAdd() {
                let optionsHtml = '';
                const categories = {
                    strength: 'Force (kg)',
                    bodyweight: 'Poids de corps (répétitions)',
                    cardio: 'Cardio / endurance'
                };
                
                for (const [cat, label] of Object.entries(categories)) {
                    optionsHtml += `<optgroup label="${label}">`;
                    for (const [exo, exoLabel] of Object.entries(EXERCISE_LABELS)) {
                        if (EXERCISE_CATEGORY[exo] === cat) {
                            optionsHtml += `<option value="${exo}">${exoLabel}</option>`;
                        }
                    }
                    optionsHtml += `</optgroup>`;
                }

                contentDiv.innerHTML = `
                    <h2 class="font-poppins text-lg mb-4">➕ Nouvelle performance</h2>
                    <form id="perfForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Exercice</label>
                            <select id="exoSelect" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-200 outline-none">
                                ${optionsHtml}
                            </select>
                        </div>
                        <div id="dynamicFields"></div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl shadow-md transition">Enregistrer la performance</button>
                    </form>
                    <div id="feedbackMessage" class="mt-5 p-3 rounded-xl text-sm hidden"></div>
                `;

                const exoSelect = document.getElementById('exoSelect');
                const dynDiv = document.getElementById('dynamicFields');
                const form = document.getElementById('perfForm');
                const feedback = document.getElementById('feedbackMessage');

                function updateFields() {
                    const exo = exoSelect.value;
                    const cat = EXERCISE_CATEGORY[exo];
                    
                    if (cat === 'cardio') {
                        let distanceValue = 5;
                        if (exo === 'run_10k') distanceValue = 10;
                        else if (exo === 'half_marathon') distanceValue = 21.1;
                        else if (exo === 'bike_20k') distanceValue = 20;
                        else if (exo === 'swim_1k') distanceValue = 1;
                        else if (exo === 'row_2k') distanceValue = 2;
                        
                        dynDiv.innerHTML = `
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Temps (minutes)</label><input type="number" step="0.1" id="timeMin" class="w-full p-3 border rounded-xl" placeholder="ex: 25.5" required></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Distance (km)</label><input type="number" step="0.1" id="distance" class="w-full p-3 border rounded-xl bg-gray-100" value="${distanceValue}" readonly></div>
                        `;
                    } else if (cat === 'bodyweight') {
                        dynDiv.innerHTML = `
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Répétitions max</label><input type="number" id="reps" class="w-full p-3 border rounded-xl" placeholder="ex: 12" required></div>
                            <input type="hidden" id="weight" value="0">
                        `;
                    } else { // strength
                        dynDiv.innerHTML = `
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Poids (kg)</label><input type="number" step="0.5" id="weight" class="w-full p-3 border rounded-xl" placeholder="ex: 60" required></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Répétitions effectuées</label><input type="number" id="reps" class="w-full p-3 border rounded-xl" placeholder="ex: 8" value="5" required></div>
                        `;
                    }
                }
                
                exoSelect.addEventListener('change', updateFields);
                updateFields();

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const exo = exoSelect.value;
                    const cat = EXERCISE_CATEGORY[exo];
                    let perfData = { 
                        exercise: exo,
                        date: new Date().toISOString()
                    };
                    let compareValue = null;

                    if (cat === 'cardio') {
                        const time = parseFloat(document.getElementById('timeMin')?.value);
                        if (!time || time <= 0) { alert('Temps invalide'); return; }
                        const distance = parseFloat(document.getElementById('distance')?.value);
                        perfData.time_min = time;
                        perfData.distance = distance;
                        compareValue = time;
                    } else if (cat === 'bodyweight') {
                        const reps = parseInt(document.getElementById('reps')?.value);
                        if (!reps || reps <= 0) { alert('Nombre de répétitions invalide'); return; }
                        perfData.reps = reps;
                        compareValue = reps;
                    } else { // strength
                        const weight = parseFloat(document.getElementById('weight')?.value);
                        const reps = parseInt(document.getElementById('reps')?.value);
                        if (!weight || weight <=0 || !reps || reps<=0) { alert('Poids ou répétitions invalides'); return; }
                        perfData.weight = weight;
                        perfData.reps = reps;
                        compareValue = weight * (1 + reps/30);
                    }

                    const sexe = state.profile?.sex || 'female';
                    const msg = getComparisonMessage(exo, compareValue, sexe);

                    feedback.className = `mt-5 p-3 rounded-xl text-sm ${(cat==='cardio' ? compareValue <= (NATIONAL_AVERAGES[exo]?.[sexe]||Infinity) : compareValue >= (NATIONAL_AVERAGES[exo]?.[sexe]||0)) ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800'}`;
                    feedback.innerHTML = `<i class="fas fa-chart-simple mr-1"></i>${msg}`;
                    feedback.classList.remove('hidden');

                    try {
                        savePerformanceToStorage(perfData);
                        
                        const savedMsg = document.createElement('div');
                        savedMsg.className = 'mt-2 text-xs text-green-600';
                        savedMsg.innerHTML = '✅ Enregistré localement !';
                        feedback.appendChild(savedMsg);
                        
                        setTimeout(() => {
                            savedMsg.remove();
                        }, 3000);
                    } catch (err) {
                        const errorMsg = document.createElement('div');
                        errorMsg.className = 'mt-2 text-xs text-red-600';
                        errorMsg.innerHTML = '❌ Erreur d\'enregistrement';
                        feedback.appendChild(errorMsg);
                    }
                });
            }

            function renderProgress() {
                const squatPerfs = state.performances.filter(p => p.exercise === 'squat').reverse();
                const labels = squatPerfs.map((_, i) => `S${i+1}`);
                const data = squatPerfs.map(p => p.weight ? p.weight * (1 + (p.reps||5)/30) : 0);

                contentDiv.innerHTML = `
                    <h2 class="font-poppins text-lg mb-3">📈 Évolution squat (1RM estimé)</h2>
                    <div class="bg-white p-3 rounded-2xl border border-gray-200">
                        <canvas id="progressChart" width="300" height="180"></canvas>
                    </div>
                    <div class="mt-5 space-y-2">
                        <p class="text-sm font-medium text-gray-600">📋 Dernières performances (tous exos)</p>
                        ${state.performances.slice(0,8).map(p => {
                            const label = EXERCISE_LABELS[p.exercise] || p.exercise;
                            return `<div class="flex justify-between bg-gray-50 p-2 rounded-lg text-sm"><span>${label}</span> <span>${p.weight ? p.weight+'kg' : ''} ${p.reps ? p.reps+' reps' : ''} ${p.time_min ? p.time_min+' min' : ''}</span></div>`;
                        }).join('')}
                    </div>
                `;

                if (state.chartInstance) state.chartInstance.destroy();
                const ctx = document.getElementById('progressChart')?.getContext('2d');
                
                if (ctx && squatPerfs.length > 0) {
                    state.chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: '1RM squat (kg)',
                                data: data,
                                borderColor: '#4f46e5',
                                tension: 0.2
                            }]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: true,
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                } else if (ctx) {
                    ctx.font = '12px Inter';
                    ctx.fillStyle = '#aaa';
                    ctx.fillText('Pas assez de données squat', 30, 90);
                }
            }

            function renderProfile() {
                const p = state.profile || { sex: 'female', age: 28, weight: 62, goal: 'Progresser' };
                
                contentDiv.innerHTML = `
                    <h2 class="font-poppins text-lg mb-4"><i class="fas fa-id-card text-indigo-500 mr-2"></i>Mon profil</h2>
                    <form id="profileForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Sexe</label>
                            <select id="sex" class="w-full p-3 border border-gray-200 rounded-xl">
                                <option value="female" ${p.sex==='female'?'selected':''}>Femme</option>
                                <option value="male" ${p.sex==='male'?'selected':''}>Homme</option>
                            </select>
                        </div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Âge</label><input type="number" id="age" value="${p.age}" class="w-full p-3 border rounded-xl"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Poids (kg)</label><input type="number" step="0.1" id="weight" value="${p.weight}" class="w-full p-3 border rounded-xl"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Objectif</label><input type="text" id="goal" value="${p.goal}" class="w-full p-3 border rounded-xl"></div>
                        <button type="submit" class="w-full bg-indigo-100 hover:bg-indigo-200 text-indigo-800 font-medium py-3 rounded-xl transition">Mettre à jour</button>
                    </form>
                    
                    <div class="mt-4 grid grid-cols-2 gap-2">
                        <button onclick="document.getElementById('quickExportBtn').click()" class="bg-green-50 hover:bg-green-100 text-green-700 font-medium py-2 rounded-xl text-sm transition flex items-center justify-center gap-1">
                            <i class="fas fa-download"></i> Exporter
                        </button>
                        <button onclick="document.getElementById('quickExportBtn').click()" class="bg-blue-50 hover:bg-blue-100 text-blue-700 font-medium py-2 rounded-xl text-sm transition flex items-center justify-center gap-1">
                            <i class="fas fa-upload"></i> Importer
                        </button>
                    </div>
                    
                    <div class="mt-4 p-3 bg-indigo-50 rounded-xl text-xs text-indigo-700">
                        <p class="flex items-center gap-2"><i class="fas fa-info-circle"></i> Utilisez l'icône <i class="fas fa-download mx-1"></i> en haut pour sauvegarder vos données. Importez le fichier sur un autre appareil.</p>
                    </div>
                `;

                document.getElementById('profileForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const updated = {
                        sex: document.getElementById('sex').value,
                        age: parseInt(document.getElementById('age').value),
                        weight: parseFloat(document.getElementById('weight').value),
                        goal: document.getElementById('goal').value
                    };
                    saveProfileToStorage(updated);
                    alert('Profil mis à jour !');
                });
            }

            function renderView(view) {
                state.currentView = view;
                navItems.forEach(item => {
                    item.classList.toggle('active', item.dataset.view === view);
                    item.classList.toggle('text-indigo-600', item.dataset.view === view);
                });
                
                if (view === 'dashboard') renderDashboard();
                else if (view === 'add') renderAdd();
                else if (view === 'progress') renderProgress();
                else if (view === 'profile') renderProfile();
            }

            // Navigation
            navItems.forEach(item => item.addEventListener('click', () => renderView(item.dataset.view)));

            // Initialisation
            loadFromStorage();
            renderView('dashboard');
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>France Donations · Financement participatif</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS principal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <div class="logo">France Donations</div>
            
            <nav class="nav-links">
                <a href="#" data-page="home" class="active">Découvrir</a>
                <a href="#" data-page="create">Lancer un projet</a>
            </nav>
            
            <div class="nav-icons">
                <div class="search-container">
                    <i class="fas fa-search" id="search-icon"></i>
                    <input type="text" class="search-input" id="search-input" placeholder="Rechercher...">
                </div>
                <i class="fas fa-bell" id="notification-icon"></i>
                <div class="user-menu" id="user-menu">
                    <i class="fas fa-user-circle" id="user-icon"></i>
                    <div class="user-dropdown hidden" id="user-dropdown">
                        <a href="#" id="profile-link">Profil</a>
                        <a href="#" id="my-projects-link">Mes projets</a>
                        <a href="#" id="logout-link">Déconnexion</a>
                    </div>
                </div>
                <i class="fas fa-sign-in-alt" id="login-icon"></i>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT (injecté dynamiquement) -->
    <main id="main-content"></main>

    <!-- BOTTOM NAV MOBILE -->
    <nav class="bottom-nav" id="bottom-nav">
        <i class="fas fa-home active" data-page="home"></i>
        <i class="fas fa-compass" data-page="explore"></i>
        <i class="fas fa-plus-circle" data-page="create"></i>
        <i class="fas fa-bell" data-page="notifications"></i>
        <i class="fas fa-user" data-page="profile"></i>
    </nav>

    <!-- MODAL AUTH -->
    <div class="modal hidden" id="auth-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="auth-modal-title">Connexion</h2>
                <i class="fas fa-times close-modal" id="close-auth-modal"></i>
            </div>
            <div class="modal-body">
                <form id="auth-form">
                    <div class="form-group">
                        <label for="auth-email">Email</label>
                        <input type="email" id="auth-email" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="auth-password">Mot de passe</label>
                        <input type="password" id="auth-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="modal-btn" id="auth-submit">Se connecter</button>
                </form>
                <div class="modal-footer">
                    <span id="auth-toggle">Créer un compte</span>
                </div>
                <div id="auth-message"></div>
            </div>
        </div>
    </div>

    <!-- MODAL CRÉATION PROJET -->
    <div class="modal hidden" id="create-project-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Lancer un projet</h2>
                <i class="fas fa-times close-modal" id="close-create-modal"></i>
            </div>
            <div class="modal-body">
                <form id="create-project-form">
                    <div class="form-group">
                        <label>Titre</label>
                        <input type="text" id="project-title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="project-description" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Montant cible (€)</label>
                        <input type="number" id="project-target" min="1" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Email PayPal</label>
                        <input type="email" id="project-paypal" required>
                    </div>
                    <button type="submit" class="modal-btn">Publier</button>
                </form>
                <div id="create-message"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Placard Malin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- TensorFlow.js dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i data-lucide="chef-hat"></i>
                <h1>Mon Placard Malin</h1>
            </div>
            <p class="subtitle">Générez un menu avec ce que vous avez déjà !</p>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Camera Section -->
            <section class="card camera-section" id="camera-section">
                <button id="start-camera-btn" class="btn btn-primary btn-large">
                    <i data-lucide="camera"></i> Prendre une photo
                </button>
                <div id="camera-container" class="hidden">
                    <video id="videoElement" autoplay playsinline></video>
                    <canvas id="canvasElement" class="hidden"></canvas>
                    <div class="camera-controls">
                        <button id="capture-btn" class="btn btn-capture">
                            <div class="capture-inner"></div>
                        </button>
                        <button id="close-camera-btn" class="btn btn-icon btn-secondary">
                            <i data-lucide="x"></i>
                        </button>
                    </div>
                </div>
                <!-- Upload as fallback -->
                <div class="upload-fallback">
                    <label for="image-upload" class="btn btn-secondary">
                        <i data-lucide="upload"></i> Importer une photo
                    </label>
                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                </div>
                
                <div id="loading-indicator" class="hidden">
                    <div class="spinner"></div>
                    <p>Analyse des ingrédients en cours...</p>
                </div>
            </section>

            <!-- Ingredients Section -->
            <section class="card ingredients-section">
                <div class="section-header">
                    <h2>Vos ingrédients</h2>
                    <span id="ingredients-count" class="badge badge-neutral">0</span>
                </div>
                
                <div class="add-ingredient">
                    <input type="text" id="manual-ingredient" placeholder="Ajouter un ingrédient manuellement...">
                    <button id="add-ingredient-btn" class="btn btn-icon btn-secondary">
                        <i data-lucide="plus"></i>
                    </button>
                </div>

                <ul id="ingredients-list" class="ingredients-list">
                    <!-- Ingredients will be injected here -->
                    <li class="empty-state" id="empty-ingredients">Aucun ingrédient détecté. Prenez une photo !</li>
                </ul>
            </section>

            <!-- Action Section -->
            <div class="action-container">
                <button id="generate-menu-btn" class="btn btn-primary btn-large btn-block" disabled>
                    <i data-lucide="utensils"></i> Générer le menu (7 jours)
                </button>
            </div>

            <!-- Menu Section -->
            <section id="menu-section" class="menu-section hidden">
                <div class="section-header">
                    <h2>Votre Menu de la Semaine</h2>
                </div>
                <div id="days-container" class="days-container">
                    <!-- Days will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="translations.js"></script>
    <script src="recipes.js"></script>
    <script src="camera.js"></script>
    <script src="vision.js"></script>
    <script src="script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
